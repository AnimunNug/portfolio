<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Портфолио — игривая анимация</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fef9f0;
      font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
      color: #5a4a42;
      line-height: 1.4;
      overflow-x: hidden;
    }

    /* ----- МАЛЕНЬКАЯ НАДПИСЬ "ПОРТФОЛИО" В САМОМ ВЕРХУ ----- */
    .top-label {
      text-align: center;
      padding: 0.8rem 0 0.2rem;
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #d4b28c;
      background: transparent;
      position: relative;
      z-index: 5;
    }

    /* ----- ШАПКА (HERO) ----- */
    .hero {
      position: relative;
      background: linear-gradient(145deg, #ffe6d5 0%, #ffd9c4 100%);
      min-height: 85vh;
      display: flex;
      align-items: center;
      padding: 4rem 5% 0 5%;   /* увеличен верхний отступ (было 2rem), рамка опустилась */
      overflow: visible;
      z-index: 1;
      clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
      margin-bottom: -2rem;
    }

    .hero-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      max-width: 1400px;
      margin: 0 auto;
      width: 100%;
      flex-wrap: wrap;
    }

    /* Левая часть — рамка с персонажем, сдвинута влево и повёрнута */
    .hero-left {
      flex: 1 1 45%;
      display: flex;
      justify-content: flex-start;
      position: relative;
      overflow: visible;
      transform: translateX(-10%);
    }

    .character-frame {
      position: relative;
      width: 100%;
      max-width: 420px;
      aspect-ratio: 1 / 1.25;
      background: rgba(255, 245, 235, 0.4);
      border: 4px solid #f3bc8c;
      border-radius: 48px;
      box-shadow: 0 20px 30px -10px rgba(0,0,0,0.05);
      overflow: visible;
      backdrop-filter: blur(2px);
      transform: rotate(-10deg) translateX(-12%);
	  bottom: -40px;
      margin-left: 2%;
    }

    .character-peek {
      position: absolute;
      bottom: -45px;
      left: -40px;
      width: 130%;
      height: auto;
      filter: drop-shadow(0 12px 18px rgba(0,0,0,0.08));
      transition: transform 0.2s ease;
    }

    .character-frame:hover .character-peek {
      transform: scale(1.02) translateY(-5px);
    }

    .hero-right {
      flex: 1 1 45%;
      text-align: left;
      transform: rotate(2deg) translateY(-8px);
      transition: transform 0.2s ease;
    }

    .hero-right h1 {
      font-size: clamp(2rem, 6vw, 4rem);
      background: linear-gradient(135deg, #e0a878, #c28a5e);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      margin-bottom: 1rem;
      font-weight: 600;
    }

    .hero-right p {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #b28b6f;
      border-left: 4px solid #f3bc8c;
      padding-left: 1.2rem;
    }

    /* ----- ВЫСТУПАЮЩАЯ ПОЛОСА ПРОЕКТОВ ----- */
    .projects-strip {
      position: relative;
      z-index: 20;
      margin: -100px 5% 0 5%;
      background: rgba(255, 255, 255, 0.98);
      backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 0.8rem 1rem;
      box-shadow: 0 20px 30px -12px rgba(0,0,0,0.15), 0 1px 2px rgba(0,0,0,0.05);
      border: 1px solid #ffe0c6;
      transform: rotate(-0.8deg);
      transition: transform 0.2s;
    }

    .projects-strip:hover {
      transform: rotate(-0.6deg);
    }

    .strip-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #c28a5e;
      margin-bottom: 0.5rem;
      text-align: center;
      font-weight: 500;
    }

    .carousel-container {
      width: 100%;
      overflow: hidden;
    }

    .carousel-track {
      display: flex;
      gap: 20px;
      width: max-content;
      animation: scrollProjects 25s linear infinite;
    }

    .carousel-track:hover {
      animation-play-state: paused;
    }

    .carousel-item {
      flex-shrink: 0;
      width: 160px;
      height: 100px;
      background: #fff7ef;
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid #ffe0c6;
      box-shadow: 0 4px 10px rgba(0,0,0,0.02);
    }

    .carousel-item:hover {
      transform: scale(1.02);
      border-color: #f3bc8c;
      box-shadow: 0 12px 20px rgba(193,134,79,0.12);
    }

    .carousel-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    @keyframes scrollProjects {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    /* ----- СЕТКА РАБОТ ----- */
    .grid-works {
      background: #fef9f0;
      padding: 4rem 5% 4rem;
    }

    .works-title {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 2rem;
      color: #c28a5e;
      font-weight: 500;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .work-card {
      background: #ffffffdd;
      backdrop-filter: blur(2px);
      border-radius: 32px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.25s ease;
      aspect-ratio: 1 / 1;
      box-shadow: 0 12px 24px -12px rgba(0,0,0,0.06);
      border: 1px solid #ffe2cc;
    }

    .work-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.3s;
    }

    .work-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 24px 32px -16px rgba(160, 100, 60, 0.2);
      border-color: #f3bc8c;
    }

    .work-card:hover img {
      transform: scale(1.02);
    }

    /* ----- ФУТЕР ----- */
    footer.contacts {
      background: #fff4ea;
      padding: 2rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1.5rem;
      border-top: 1px solid #ffe2cc;
      border-radius: 32px 32px 0 0;
    }

    .contacts-text p {
      margin: 0.4rem 0;
      color: #b2825e;
    }

    .small-character {
      width: 80px;
    }

    .small-character img {
      width: 100%;
      transform: rotate(8deg);
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.05));
    }

    /* ----- ПОПАП ----- */
    .popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(250, 240, 230, 0.94);
      backdrop-filter: blur(12px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: 0.3s;
      z-index: 1000;
    }

    .popup.show {
      opacity: 1;
      visibility: visible;
    }

    .popup-content {
      background: #ffffffea;
      padding: 1.5rem;
      border-radius: 48px;
      max-width: 90vw;
      width: 600px;
      text-align: center;
      transform: scale(0.94);
      transition: transform 0.25s;
      border: 1px solid #ffe0c6;
    }

    .popup.show .popup-content {
      transform: scale(1);
    }

    .popup img {
      width: 100%;
      border-radius: 32px;
      margin-bottom: 1rem;
    }

    .popup p {
      font-size: 1.2rem;
      color: #b27a52;
    }

    /* ----- АДАПТИВ ----- */
    @media (max-width: 1000px) {
      .hero {
        padding-top: 3rem;   /* чуть меньше отступ на планшетах */
      }
      .hero-inner {
        flex-direction: column;
        text-align: center;
        gap: 2rem;
      }
      .hero-right {
        text-align: center;
        transform: rotate(1deg) translateY(-4px);
      }
      .hero-right p {
        border-left: none;
        padding-left: 0;
      }
      .hero-left {
        transform: translateX(-5%);
      }
      .character-frame {
        max-width: 320px;
        transform: rotate(-8deg) translateX(-8%);
        margin-left: -4%;
      }
      .character-peek {
        bottom: -25px;
        left: -30px;
        width: 120%;
      }
      .grid-container {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.2rem;
      }
      .projects-strip {
        margin: -60px 3% 0 3%;
      }
      .carousel-item {
        width: 140px;
        height: 90px;
      }
    }

    @media (max-width: 650px) {
      .hero {
        min-height: 70vh;
        padding-top: 2rem;
        clip-path: polygon(0 0, 100% 0, 100% 92%, 0 100%);
      }
      .hero-right {
        transform: none;
      }
      .hero-left {
        transform: translateX(-2%);
      }
      .character-frame {
        max-width: 260px;
        transform: rotate(-5deg) translateX(-5%);
        margin-left: -2%;
      }
      .character-peek {
        bottom: -20px;
        left: -20px;
        width: 115%;
      }
      .grid-container {
        grid-template-columns: 1fr;
      }
      .carousel-item {
        width: 120px;
        height: 80px;
      }
      .small-character {
        width: 60px;
      }
      .projects-strip {
        margin: -45px 2% 0 2%;
      }
      .top-label {
        font-size: 0.6rem;
        letter-spacing: 3px;
        padding: 0.5rem 0 0;
      }
    }

    /* анимация карточек */
    .work-card {
      opacity: 0;
      animation: fadeInUp 0.5s forwards;
      animation-delay: calc(var(--order) * 0.05s);
    }
    .grid-container .work-card:nth-child(1) { --order: 1; }
    .grid-container .work-card:nth-child(2) { --order: 2; }
    .grid-container .work-card:nth-child(3) { --order: 3; }
    .grid-container .work-card:nth-child(4) { --order: 4; }
    .grid-container .work-card:nth-child(5) { --order: 5; }
    .grid-container .work-card:nth-child(6) { --order: 6; }
    .grid-container .work-card:nth-child(7) { --order: 7; }
    .grid-container .work-card:nth-child(8) { --order: 8; }
    .grid-container .work-card:nth-child(9) { --order: 9; }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body>

<!-- МАЛЕНЬКАЯ НАДПИСЬ "ПОРТФОЛИО" САМАЯ ВЕРХНЯЯ -->
<div class="top-label">animun portfolio</div>

<!-- ШАПКА -->
<header class="hero">
  <div class="hero-inner">
    <div class="hero-left">
      <div class="character-frame">
        <img src="https://via.placeholder.com/450x550/ffb88c/ffffff?text=CHARACTER" alt="Персонаж" class="character-peek">
      </div>
    </div>
    <div class="hero-right">
      <h1>Animun</h1>
      <p>silly mc stuff</p>

</header>

<!-- БЛОК УЧАСТИЯ В ПРОЕКТАХ -->
<div class="projects-strip">
  <div class="strip-title">participate</div>
  <div class="carousel-container">
    <div class="carousel-track">
      <div class="carousel-item"><img src="https://via.placeholder.com/180x120/e3c9a5/fff?text=Alpha" alt="Проект Alpha"></div>
      <div class="carousel-item"><img src="https://via.placeholder.com/180x120/cbb59a/fff?text=VFX" alt="VFX"></div>
      <div class="carousel-item"><img src="https://via.placeholder.com/180x120/dbc2a8/fff?text=Game+Trailer" alt="Game"></div>
      <div class="carousel-item"><img src="https://via.placeholder.com/180x120/e7cfb0/fff?text=Short+Film" alt="Short"></div>
      <div class="carousel-item"><img src="https://via.placeholder.com/180x120/f0dbc0/fff?text=Motion" alt="Motion"></div>
      <div class="carousel-item"><img src="https://via.placeholder.com/180x120/ddc7a5/fff?text=3D" alt="3D"></div>
    </div>
  </div>
</div>

<!-- СЕТКА РАБОТ -->
<main class="grid-works">
  <h2 class="works-title">my works</h2>
  <div class="grid-container">
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/e3c9a5/fff?text=Work+1', 'Анимационный ролик «Облачко»')">
      <img src="https://via.placeholder.com/300x300/e3c9a5/fff?text=WORK+1" alt="Работа 1">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/cbb59a/fff?text=Work+2', 'Трейлер для инди-игры')">
      <img src="https://via.placeholder.com/300x300/cbb59a/fff?text=WORK+2" alt="Работа 2">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/dbc2a8/fff?text=Work+3', 'Motion graphics для сказки')">
      <img src="https://via.placeholder.com/300x300/dbc2a8/fff?text=WORK+3" alt="Работа 3">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/e7cfb0/fff?text=Work+4', 'Короткометражка «Утро»')">
      <img src="https://via.placeholder.com/300x300/e7cfb0/fff?text=WORK+4" alt="Работа 4">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/f0dbc0/fff?text=Work+5', 'Анимация персонажа')">
      <img src="https://via.placeholder.com/300x300/f0dbc0/fff?text=WORK+5" alt="Работа 5">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/ddc7a5/fff?text=Work+6', 'Реклама stop-motion')">
      <img src="https://via.placeholder.com/300x300/ddc7a5/fff?text=WORK+6" alt="Работа 6">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/e3c9a5/fff?text=Work+7', 'Акварельная анимация')">
      <img src="https://via.placeholder.com/300x300/e3c9a5/fff?text=WORK+7" alt="Работа 7">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/cbb59a/fff?text=Work+8', 'Фоны для сериала')">
      <img src="https://via.placeholder.com/300x300/cbb59a/fff?text=WORK+8" alt="Работа 8">
    </div>
    <div class="work-card" onclick="openPopup('https://via.placeholder.com/800x600/dbc2a8/fff?text=Work+9', 'Плавный тизер')">
      <img src="https://via.placeholder.com/300x300/dbc2a8/fff?text=WORK+9" alt="Работа 9">

</main>

<!-- ФУТЕР -->
<footer class="contacts">
  <div class="contacts-text">
    <p>twitter: @animuns_body</p>
    <p>discord: animun_second</p>
  </div>
  <div class="small-character">
    <img src="https://via.placeholder.com/100x70/f3d5b5/fff?text=Zzz" alt="Лежащий персонаж">
  </div>
</footer>

<!-- ПОПАП -->
<div id="popup" class="popup" onclick="closePopup()">
  <div class="popup-content" onclick="event.stopPropagation()">
    <img id="popup-img" alt="Деталь">
    <p id="popup-text"></p>
  </div>
</div>

<script>
  function initCarousel() {
    const track = document.querySelector('.carousel-track');
    if (!track) return;
    const items = Array.from(track.children);
    if (!items.length) return;
    for (let i = 0; i < 2; i++) {
      items.forEach(item => {
        track.appendChild(item.cloneNode(true));
      });
    }
  }

  function openPopup(imgSrc, desc) {
    const popup = document.getElementById('popup');
    const popupImg = document.getElementById('popup-img');
    const popupText = document.getElementById('popup-text');
    if (popupImg) popupImg.src = imgSrc;
    if (popupText) popupText.innerText = desc;
    if (popup) popup.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closePopup() {
    const popup = document.getElementById('popup');
    if (popup) popup.classList.remove('show');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closePopup();
  });

  function bindCarouselClicks() {
    const items = document.querySelectorAll('.carousel-item');
    const descriptions = [
      'Участие в сериале "Облачный край" — анимация фонов',
      'VFX для клипа «Рассвет» — частицы и свет',
      'Анимация кат-сцен для игры "Cozy Forest"',
      'Пост-продакшн короткометражки «Мятный чай»',
      'Motion дизайн для фестиваля анимации',
      '3D персонаж для рекламной интеграции'
    ];
    items.forEach((item, idx) => {
      const img = item.querySelector('img');
      if (img) {
        item.style.cursor = 'pointer';
        item.addEventListener('click', (e) => {
          e.stopPropagation();
          openPopup(img.src, descriptions[idx % descriptions.length]);
        });
      }
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    initCarousel();
    bindCarouselClicks();
  });
</script>
</body>
</html>
