<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animun | 3D & Model Portfolio</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700;900&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg: #fff5e6;
      --accent: #ff9d4d;
      --accent-dark: #e67e22;
      --text-dark: #4a3a31;
      --card-shadow: #e6b38a;
      --toy-blue: #70d6ff;
      --toy-pink: #ff70a6;
      --white: #ffffff;
    }

    * { 
      margin: 0; padding: 0; box-sizing: border-box; 
      cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="%23ff9d4d" stroke="white" stroke-width="2"/></svg>') 12 12, auto;
    }
    
    body { 
      background: var(--bg); 
      font-family: 'Quicksand', sans-serif; 
      background-image: radial-gradient(#f3bc8c 1px, transparent 1px);
      background-size: 30px 30px;
      overflow-x: hidden;
      color: var(--text-dark);
    }

    /* --- NAVIGATION --- */
    nav {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--white);
      padding: 10px 30px;
      border-radius: 50px;
      border: 4px solid var(--text-dark);
      box-shadow: 0 8px 0px var(--card-shadow);
      display: flex;
      gap: 2rem;
      z-index: 1000;
      animation: slideDown 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    nav a {
      text-decoration: none;
      font-family: 'Fredoka One', cursive;
      color: var(--text-dark);
      font-size: 1.1rem;
      transition: color 0.2s;
    }

    nav a:hover { color: var(--accent); }

    /* --- HERO (Произведение искусства) --- */
    .hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding: 0 8%;
      overflow: hidden;
    }

    /* Плавающие "блоки" на фоне */
    .floating-shape {
      position: absolute;
      background: var(--white);
      border: 6px solid var(--text-dark);
      border-radius: 20px;
      box-shadow: 0 10px 0px var(--card-shadow);
      z-index: 0;
      animation: float 6s ease-in-out infinite;
    }

    .shape-1 { width: 80px; height: 80px; top: 20%; left: 10%; animation-delay: 0s; background: var(--toy-blue); }
    .shape-2 { width: 60px; height: 60px; top: 60%; left: 85%; animation-delay: -2s; background: var(--toy-pink); border-radius: 50%; }
    .shape-3 { width: 100px; height: 100px; bottom: 15%; left: 20%; animation-delay: -4s; background: var(--accent); transform: rotate(15deg); }

    .hero-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 4rem;
      max-width: 1300px;
      margin: 0 auto;
      width: 100%;
      z-index: 10;
    }

    .hero-right { position: relative; }

    .hero-right h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(4rem, 9vw, 8rem);
      line-height: 0.85;
      color: var(--white);
      -webkit-text-stroke: 4px var(--text-dark);
      text-shadow: 
        8px 8px 0px var(--toy-blue),
        16px 16px 0px var(--card-shadow);
      margin-bottom: 2rem;
      position: relative;
    }

    .hero-right p {
      display: inline-block;
      background: var(--accent);
      color: white;
      padding: 12px 30px;
      border-radius: 50px;
      border: 4px solid var(--text-dark);
      font-weight: 900;
      font-size: 1.2rem;
      transform: rotate(-3deg);
      box-shadow: 0 8px 0px var(--text-dark);
      transition: transform 0.2s;
    }
    
    .hero-right p:hover { transform: rotate(0deg) scale(1.05); }

    .character-frame {
      position: relative;
      width: 100%;
      max-width: 480px;
      aspect-ratio: 1;
      background: var(--toy-blue);
      border: 8px solid var(--text-dark);
      border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
      box-shadow: 0 20px 0px var(--text-dark), inset 0 0 40px rgba(255,255,255,0.4);
      animation: morph 10s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .character-frame::after {
      content: '';
      position: absolute;
      inset: 10px;
      border: 4px dashed white;
      border-radius: inherit;
      animation: morph 10s ease-in-out infinite reverse;
    }

    .character-peek {
      width: 110%;
      transform: translateY(10%);
      z-index: 2;
    }

    .scroll-down {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Fredoka One', cursive;
      color: var(--accent);
      animation: bounce 2s infinite;
    }

    /* --- БЕГУЩАЯ СТРОКА --- */
    .marquee-wrapper {
      background: var(--text-dark);
      padding: 1.5rem 0;
      overflow: hidden;
      border-top: 6px solid var(--accent);
      border-bottom: 6px solid var(--accent);
      position: relative;
      transform: rotate(-1deg) scale(1.02);
      box-shadow: 0 15px 0px rgba(0,0,0,0.1);
      z-index: 5;
    }

    .marquee {
      display: flex;
      white-space: nowrap;
      animation: marquee 20s linear infinite;
    }

    .marquee span {
      font-family: 'Fredoka One', cursive;
      font-size: 2.5rem;
      color: var(--bg);
      margin-right: 3rem;
      display: inline-flex;
      align-items: center;
    }
    
    .marquee span::after {
      content: '✦';
      color: var(--toy-blue);
      margin-left: 3rem;
    }

    /* --- ПОРТФОЛИО --- */
    .portfolio-section {
      padding: 8rem 8%;
      max-width: 1400px;
      margin: 0 auto;
    }

    .section-title {
      text-align: center;
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      color: var(--text-dark);
      margin-bottom: 3rem;
    }

    /* Фильтры */
    .filters {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 4rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: var(--white);
      border: 4px solid var(--text-dark);
      padding: 10px 25px;
      border-radius: 30px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.1rem;
      color: var(--text-dark);
      box-shadow: 0 6px 0px var(--card-shadow);
      transition: all 0.2s;
    }

    .filter-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 9px 0px var(--card-shadow);
    }

    .filter-btn.active {
      background: var(--toy-blue);
      color: white;
    }

    /* Сетка */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); 
      gap: 3rem;
      perspective: 1000px;
    }

    .work-card {
      background: var(--white);
      border-radius: 40px;
      aspect-ratio: 4 / 3;
      position: relative;
      border: 6px solid var(--text-dark);
      box-shadow: 0 15px 0px var(--card-shadow);
      transition: transform 0.1s ease-out, box-shadow 0.2s;
      overflow: hidden;
      transform-style: preserve-3d;
    }

    .work-card img { 
      width: 100%; 
      height: 100%; 
      object-fit: cover; 
      border-radius: 32px; 
      transition: 0.3s;
    }

    .card-content {
      position: absolute;
      inset: 0;
      background: rgba(74, 58, 49, 0.9);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: 0.3s;
      border-radius: 32px;
    }

    .work-card:hover .card-content { opacity: 1; }
    .work-card:hover img { transform: scale(1.1); }

    .card-content h3 {
      font-family: 'Fredoka One', cursive;
      color: var(--white);
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      transform: translateZ(50px); /* 3D effect */
    }

    .card-category {
      background: var(--accent);
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-weight: 700;
      font-size: 0.9rem;
      transform: translateZ(30px);
    }

    /* --- MODAL --- */
    /* ... (Стиль модалки остался прежним, но адаптирован) ... */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(255, 245, 230, 0.9);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      z-index: 9999; opacity: 0; visibility: hidden;
      transition: all 0.3s ease;
    }

    .modal-overlay.active { opacity: 1; visibility: visible; }

    .modal-box {
      width: 90%; max-width: 800px;
      background: var(--white); 
      border-radius: 40px;
      position: relative; 
      border: 8px solid var(--text-dark);
      box-shadow: 0 25px 0px var(--card-shadow);
      transform: scale(0.9) translateY(30px);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .modal-overlay.active .modal-box { transform: scale(1) translateY(0); }

    .close-modal {
      position: absolute; top: 20px; right: 20px;
      width: 50px; height: 50px;
      background: var(--toy-pink); border: 4px solid var(--text-dark);
      border-radius: 50%; color: white;
      font-family: 'Fredoka One', cursive; font-size: 22px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 0px var(--text-dark); z-index: 100;
      transition: 0.2s;
    }
    
    .close-modal:hover { transform: translateY(-3px); box-shadow: 0 9px 0px var(--text-dark); }
    .close-modal:active { transform: translateY(3px); box-shadow: 0 2px 0px var(--text-dark); }

    .modal-layout { display: flex; flex-direction: column; }
    .modal-img-container { width: 100%; height: 400px; background: #e0e0e0; border-bottom: 6px solid var(--text-dark);}
    .modal-img-container img { width: 100%; height: 100%; object-fit: cover; }

    .modal-info { padding: 2.5rem; background: var(--bg); }
    .modal-info h3 { font-family: 'Fredoka One', cursive; font-size: 2.5rem; margin-bottom: 15px; color: var(--text-dark); }
    .modal-info p { font-weight: 700; font-size: 1.1rem; line-height: 1.6; color: var(--text-dark); }

    footer {
      margin: 2rem 8% 4rem; padding: 3rem;
      background: var(--text-dark); border-radius: 40px;
      color: white; display: flex; justify-content: space-between; align-items: center;
      border: 6px solid var(--text-dark);
      box-shadow: 0 12px 0px var(--card-shadow);
    }

    @keyframes morph {
      0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
      50% { border-radius: 50% 50% 33% 67% / 55% 27% 73% 45%; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
    }
    @keyframes marquee {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
      40% { transform: translateY(-20px) translateX(-50%); }
      60% { transform: translateY(-10px) translateX(-50%); }
    }
    @keyframes slideDown {
      from { top: -100px; }
      to { top: 20px; }
    }

    @media (max-width: 900px) {
      .hero-inner { grid-template-columns: 1fr; text-align: center; margin-top: 5rem; }
      .hero-right h1 { font-size: 4rem; text-shadow: 4px 4px 0px var(--toy-blue), 8px 8px 0px var(--card-shadow); }
      .grid-container { grid-template-columns: 1fr; }
      .floating-shape { display: none; }
    }
  </style>
</head>
<body>

  <nav>
    <a href="#home">Home</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
  </nav>

  <header class="hero" id="home">
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>
    <div class="floating-shape shape-3"></div>

    <div class="hero-inner">
      <div class="hero-left">
        <div class="character-frame">
          <img src="https://via.placeholder.com/450x550/70d6ff/ffffff?text=MODEL" class="character-peek">
        </div>
      </div>
      <div class="hero-right">
        <h1 id="hero-title">ANIMUN<br>BOX</h1>
        <p>Minecraft Models & Digital Design</p>
      </div>
    </div>
    <div class="scroll-down">↓ SCROLL ↓</div>
  </header>

  <div class="marquee-wrapper">
    <div class="marquee" id="marqueeText">
      <span>BLOCKBENCH</span>
      <span>JAVA MODELS</span>
      <span>ANIMATIONS</span>
      <span>TEXTURES</span>
      <span>MOD ASSETS</span>
      <span>BLOCKBENCH</span>
      <span>JAVA MODELS</span>
      <span>ANIMATIONS</span>
      <span>TEXTURES</span>
      <span>MOD ASSETS</span>
    </div>
  </div>

  <main class="portfolio-section" id="portfolio">
    <h2 class="section-title">MY WORKS</h2>
    
    <div class="filters">
      <button class="filter-btn active" data-filter="all">Всё подряд</button>
      <button class="filter-btn" data-filter="mobs">Сущности</button>
      <button class="filter-btn" data-filter="mods">Ассеты для модов</button>
      <button class="filter-btn" data-filter="design">2D Дизайн</button>
    </div>

    <div class="grid-container" id="worksGrid"></div>
  </main>

  <footer id="contact">
    <div>
      <p><b>Twitter:</b> @animuns_body</p>
      <p><b>Discord:</b> animun_second</p>
    </div>
    <h2 style="font-family: 'Fredoka One';">BYE-BYE!</h2>
  </footer>

  <div class="modal-overlay" id="workModal" onclick="closeWork()">
    <div class="modal-box" onclick="event.stopPropagation()">
      <button class="close-modal" onclick="closeWork()">X</button>
      <div class="modal-layout">
        <div class="modal-img-container">
          <img id="m-img" src="" alt="">
        </div>
        <div class="modal-info">
          <h3 id="m-title">Project Name</h3>
          <p id="m-desc">Description text...</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    // РАСШИРЕННЫЕ ДАННЫЕ РАБОТ (с категориями)
    const works = [
      { category: 'mobs', title: 'Cat Companion Entity', desc: 'Модель домашнего кота-компаньона со сложной структурой костей и кастомными анимациями поведения.', img: 'https://via.placeholder.com/800x600/ff9d4d/fff?text=Cat+Model' },
      { category: 'mods', title: 'Fishing Mechanics (1.20.1)', desc: 'Разработка визуальной логики, ассетов и моделей для кастомной механики рыбалки (Fabric 1.20.1).', img: 'https://via.placeholder.com/800x600/70d6ff/fff?text=Mod+Assets' },
      { category: 'design', title: 'Hytale RU Logo', desc: 'Стилистическая адаптация и перевод оригинального логотипа с сохранением фактуры и штриховки оригинала.', img: 'https://via.placeholder.com/800x600/ff70a6/fff?text=Hytale+Logo' },
      { category: 'design', title: 'Acorn Minimalist', desc: 'Векторный минималистичный арт в форме желудя для IT-бренда.', img: 'https://via.placeholder.com/800x600/ff9d4d/fff?text=Acorn+Vector' },
      { category: 'mobs', title: 'Forest Guard Boss', desc: 'Массивная модель босса с детализированной геометрией и проработанным освещением текстур.', img: 'https://via.placeholder.com/800x600/70d6ff/fff?text=Boss+Entity' },
      { category: 'design', title: 'YouTube Art', desc: 'Оформление превью и графики для развития личного YouTube-канала.', img: 'https://via.placeholder.com/800x600/ff70a6/fff?text=YT+Thumbnails' }
    ];

    const grid = document.getElementById('worksGrid');

    function renderWorks(filter = 'all') {
      grid.innerHTML = '';
      const filteredWorks = filter === 'all' ? works : works.filter(w => w.category === filter);
      
      filteredWorks.forEach(work => {
        const card = document.createElement('div');
        card.className = 'work-card';
        card.innerHTML = `
          <img src="${work.img}" alt="${work.title}">
          <div class="card-content">
            <h3>${work.title}</h3>
            <span class="card-category">${work.category.toUpperCase()}</span>
          </div>
        `;
        
        card.onclick = () => openWork(work);

        // 3D TILT EFFECT ДЛЯ КАРТОЧЕК
        card.addEventListener('mousemove', (e) => {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateX = ((y - centerY) / centerY) * -10; 
          const rotateY = ((x - centerX) / centerX) * 10;
          
          card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
        });

        card.addEventListener('mouseleave', () => {
          card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
        });

        grid.appendChild(card);
      });
    }

    // Инициализация фильтров
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        e.target.classList.add('active');
        renderWorks(e.target.dataset.filter);
      });
    });

    renderWorks();

    // Параллакс заголовка
    window.addEventListener('scroll', () => {
      const scrollY = window.scrollY;
      const title = document.getElementById('hero-title');
      if (title && window.innerWidth > 900) {
        title.style.transform = `translateY(${scrollY * 0.4}px)`;
      }
    });

    // Управление попапом
    function openWork(work) {
      document.getElementById('m-img').src = work.img;
      document.getElementById('m-title').innerText = work.title;
      document.getElementById('m-desc').innerText = work.desc;
      
      document.getElementById('workModal').classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeWork() {
      document.getElementById('workModal').classList.remove('active');
      document.body.style.overflow = 'auto';
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeWork();
    });
  </script>
</body>
</html>
